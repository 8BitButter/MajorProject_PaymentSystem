spring:
  datasource:
    url: jdbc:h2:mem:dips;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

dips:
  delay:
    base-ms: 0
    jitter-ms: 0
  scheduler:
    enabled: false
  sms:
    aes-key-base64: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
