spring:
  datasource:
    url: jdbc:h2:mem:dips;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} correlationId=%X{correlationId:-na} transactionId=%X{transactionId:-na} - %msg%n"

dips:
  scheduler:
    enabled: false
    operation-timeout-ms: 3000
    operation-max-retries: 2
    operation-retry-backoff-ms: 1000
  sms:
    aes-key-base64: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
