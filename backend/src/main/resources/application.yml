server:
  port: ${SERVER_PORT:0}

spring:
  application:
    name: dips-simulator
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dips}
    username: ${SPRING_DATASOURCE_USERNAME:dips}
    password: ${SPRING_DATASOURCE_PASSWORD:dips}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: ${DIPS_DB_SCHEMA:dips_app}
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    default-schema: ${DIPS_DB_SCHEMA:dips_app}
    schemas: ${DIPS_DB_SCHEMA:dips_app}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} correlationId=%X{correlationId:-na} transactionId=%X{transactionId:-na} - %msg%n"

dips:
  scheduler:
    enabled: true
    small-value-threshold: 500.00
    high-load-normal-pause-ms: 1200
    high-burst-before-normal: 3
    queue-poll-delay-ms: 120
    max-retry-attempts: 8
    operation-timeout-ms: 3000
    operation-max-retries: 2
    operation-retry-backoff-ms: 1000
  sms:
    aes-key-base64: ${DIPS_SMS_AES_KEY_BASE64:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
    max-skew-seconds: 300
