<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIPS Simulator - Payee Console</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">Payer Console</a>
    <a href="/payee.html">Payee Console</a>
    <a href="/admin.html">Admin Console</a>
  </div>
  <h1>Payee Console</h1>
  <p class="subtitle">Second-session view for recipient-side transaction updates and final receipt state.</p>

  <div class="row">
    <div class="card">
      <h2>Subscribe</h2>
      <label>Payee VPA (User Stream Key)</label>
      <input id="payeeUserId" value="payee@acquirer" />
      <div style="margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <button id="connectBtn">Connect User Stream</button>
        <button class="secondary" id="disconnectBtn">Disconnect</button>
      </div>
      <div style="margin-top:12px">
        <span id="connectionState" class="status-pill">DISCONNECTED</span>
      </div>
    </div>

    <div class="card">
      <h2>Latest Recipient State</h2>
      <p id="latestState" class="subtitle">No events yet.</p>
      <div id="recipientTx" class="event-log"></div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>User Stream Event Log</h2>
    <div id="payeeEventLog" class="event-log"></div>
  </div>
</div>
<script src="/payee.js"></script>
</body>
</html>
