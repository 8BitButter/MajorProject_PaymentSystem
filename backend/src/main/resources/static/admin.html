<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIPS Simulator - Admin Console</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">Payer Console</a>
    <a href="/payee.html">Payee Console</a>
    <a href="/admin.html">Admin Console</a>
  </div>
  <h1>Admin Console</h1>
  <p class="subtitle">Control failure scenarios and load profile for reproducible testing.</p>

  <div class="row">
    <div class="card">
      <h2>Load Profile</h2>
      <label>Profile</label>
      <select id="loadProfile">
        <option value="NORMAL">NORMAL</option>
        <option value="HIGH_LOAD">HIGH_LOAD</option>
      </select>
      <div style="margin-top:12px">
        <button id="setProfileBtn">Set Load Profile</button>
      </div>
    </div>

    <div class="card">
      <h2>Failure Scenarios</h2>
      <div class="grid-2">
        <button class="secondary scenarioBtn" data-scenario="VALIDATION_FAIL" data-enable="true">Enable VALIDATION_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="VALIDATION_FAIL" data-enable="false">Disable VALIDATION_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="DEBIT_FAIL" data-enable="true">Enable DEBIT_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="DEBIT_FAIL" data-enable="false">Disable DEBIT_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="CREDIT_FAIL" data-enable="true">Enable CREDIT_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="CREDIT_FAIL" data-enable="false">Disable CREDIT_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="SWITCH_FAIL" data-enable="true">Enable SWITCH_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="SWITCH_FAIL" data-enable="false">Disable SWITCH_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="REVERSAL_FAIL" data-enable="true">Enable REVERSAL_FAIL</button>
        <button class="secondary scenarioBtn" data-scenario="REVERSAL_FAIL" data-enable="false">Disable REVERSAL_FAIL</button>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>Status Snapshot</h2>
    <div id="statusDump" class="event-log"></div>
    <div style="margin-top:12px">
      <button id="refreshStatusBtn">Refresh Status</button>
    </div>
  </div>
</div>
<script src="/admin.js"></script>
</body>
</html>
